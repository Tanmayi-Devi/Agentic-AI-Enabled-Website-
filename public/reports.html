    <div class="container">
    <h1>Spending Reports</h1>
    <canvas id="myChart" width="200" height="200"></canvas>
    </div>
    <script>
        // 1. Get your totals (as you already do)
     // 1. Get your totals (as you already do)
        const totals = getCategoryTotals();
        const categories = Object.keys(totals);
        const amounts = Object.values(totals);

// 2. Define a list of different colors
        const colorPalette = [
            '#2a6e48', '#d9534f', '#f0ad4e', '#5bc0de', '#428bca', '#777777'
        ];

// 3. Create an array of colors that matches the number of categories
        const backgroundColors = categories.map((_, index) => 
            colorPalette[index % colorPalette.length]
        );

// 4. Update the chart initialization
        new Chart(document.getElementById('myChart'), {
            type: "pie",
            data: {
                labels: categories,
                datasets: [{
                    data: amounts,
                    backgroundColor: backgroundColors // Use the dynamic array here
                }]
            }
        });
    </script>
